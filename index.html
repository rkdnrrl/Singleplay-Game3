<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>고철 줍기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="stars" aria-hidden="true"></canvas>

  <div class="app">
    <header class="hud">
      <div class="hud-block hud-coin">
        <span class="hud-label">게임머니</span>
        <span id="coinCount" class="hud-value coin-value">-</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">총 줍은 수</span>
        <span id="totalCatches" class="hud-value">0</span>
      </div>
    </header>

    <main class="stage">
      <div class="planet" aria-hidden="true"></div>

      <div class="fisher-scene">
        <div class="astronaut" aria-hidden="true">
          <div class="player-sprite-host" id="playerSpriteHost"></div>
        </div>
        <div class="beam-line" id="beamLine"></div>
        <div class="lure" id="lure" aria-hidden="true"></div>
      </div>

      <!-- 상태별 UI -->
      <button class="cast-btn" id="castBtn" type="button">고철 줍기 시작</button>

      <div class="status-msg hidden" id="statusMsg"></div>

      <!-- 미니게임 (자석·집게 바) -->
      <div class="minigame hidden" id="minigame">
        <p class="minigame-hint">누르고 있으면 막대가 올라가요! (모바일: 화면 아무 곳이나 길게 누르기)</p>
        <div class="minigame-wrap">
          <div class="minigame-track" id="minigameTrack">
            <div class="target-zone" id="targetZone"></div>
            <div class="catch-bar" id="catchBar"></div>
          </div>
          <div class="catch-progress-wrap">
            <div class="catch-progress-bg">
              <div class="catch-progress-fill" id="catchProgressFill"></div>
            </div>
            <span class="catch-progress-label">인양</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 적재함: 뷰포트 고정, 메인 게임 플로우·레이아웃과 분리 -->
  <section class="log-panel inventory-dock" id="inventoryDock" aria-label="적재함">
    <div class="inv-header">
      <h2 class="log-title">적재함</h2>
      <button class="sell-all-btn hidden" id="sellAllBtn" type="button"></button>
    </div>
    <div class="inv-scroll-wrap" id="inventoryScrollWrap">
      <div class="log-list" id="inventoryList">
        <p class="log-empty">적재함이 비어 있습니다</p>
      </div>
    </div>
  </section>

  <!-- 판매 확인 (개별·전체) -->
  <!-- Three.js (복셀 뷰어) — game.js보다 먼저 로드 -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="three-bridge.js"></script>

  <div class="sell-confirm-overlay hidden" id="sellConfirmOverlay" role="dialog" aria-modal="true" aria-labelledby="sellConfirmTitle">
    <div class="sell-confirm-box">
      <h3 class="sell-confirm-title" id="sellConfirmTitle">판매 확인</h3>
      <p class="sell-confirm-msg" id="sellConfirmMsg"></p>
      <div class="sell-confirm-actions">
        <button type="button" class="sell-confirm-btn sell-confirm-btn--cancel" id="sellConfirmCancel">취소</button>
        <button type="button" class="sell-confirm-btn sell-confirm-btn--ok" id="sellConfirmOk">팔기</button>
      </div>
    </div>
  </div>

  <!-- 픽셀 → 3D 복셀 회전 보기 -->
  <div class="voxel-viewer-overlay hidden" id="voxelViewerOverlay" role="dialog" aria-modal="true" aria-labelledby="voxelViewerTitle">
    <div class="voxel-viewer-box">
      <h3 class="voxel-viewer-title" id="voxelViewerTitle">3D 보기</h3>
      <p class="voxel-viewer-hint">드래그·핀치로 돌려 보세요</p>
      <div class="voxel-viewer-canvas-host" id="voxelViewerCanvasHost"></div>
      <button type="button" class="voxel-viewer-close" id="voxelViewerClose">닫기</button>
    </div>
  </div>

  <!-- 심연 스캔 대기: 팁 + 카운터 + 트랙 -->
  <div id="scanPanel" class="scan-panel hidden" role="status" aria-live="polite">
    <p class="scan-tip">도감에 등록된 적이 없는 고철일수록 알려진 패턴을 못 쓰니 심연 신호를 처음부터 맞춰야 해서 해석이 더 오래 걸릴 수 있어요.</p>
    <p id="scanCountdownLine" class="scan-countdown-line">
      <span id="scanCountNum">20</span>초 · 예상 대기
    </p>
    <p id="scanOngoingLine" class="scan-ongoing-line hidden">
      <span class="scan-ongoing-main">심연 신호를 읽는 중입니다</span>
      <span class="scan-ongoing-elapsed"><span id="scanOngoingElapsed">1</span>초</span>
      <span class="status-scan-dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span><span>.</span></span>
    </p>
    <p id="scanBonusLine" class="scan-bonus-line hidden" role="status" aria-live="polite">
      심연 신호 해석 성공 · 보너스 <span class="scan-bonus-amount">+100원</span>
    </p>
    <div class="scan-box-inner">
      <div class="scan-track">
        <div class="scan-beam"></div>
        <span class="scan-lens" aria-hidden="true"></span>
        <div class="scan-hud-corner scan-hud-corner--tl" aria-hidden="true"></div>
        <div class="scan-hud-corner scan-hud-corner--tr" aria-hidden="true"></div>
        <div class="scan-hud-corner scan-hud-corner--bl" aria-hidden="true"></div>
        <div class="scan-hud-corner scan-hud-corner--br" aria-hidden="true"></div>
      </div>
      <p class="scan-label" id="scanMainLabel">심연 스캔 중<span class="status-scan-dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span><span>.</span></span></p>
    </div>
  </div>

  <div class="result-card hidden" id="resultCard">
    <div class="result-preview">
      <div class="result-sprite-host" id="resultSpriteHost" aria-hidden="true"></div>
    </div>
    <div class="result-body">
      <span class="result-rarity" id="resultRarity"></span>
      <span class="result-name" id="resultName"></span>
      <span class="result-size" id="resultSize"></span>
      <span class="result-added">적재함에 넣었습니다</span>
    </div>
    <div class="result-coins" id="resultCoins"></div>
  </div>

  <script src="config.js"></script>
  <script defer src="game.js"></script>
</body>
</html>
