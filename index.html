<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>낚시 클리커</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="hud">
      <div class="hud-block">
        <span class="hud-label">점수</span>
        <span id="score" class="hud-value">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">최고 기록</span>
        <span id="highScore" class="hud-value">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">낚은 물고기</span>
        <span id="caught" class="hud-value">0</span>
      </div>
      <div class="hud-block hud-coin" id="coinBlock">
        <span class="hud-label">🪙 게임머니</span>
        <span id="coinCount" class="hud-value coin-value">-</span>
      </div>
    </header>

    <p class="hint">물고기가 물었어요! 연타로 릴을 감아 체력을 깎으세요. 잡으면 큰 보너스!</p>

    <main class="stage" id="stage">
      <div class="tension-layer" id="tensionLayer" aria-hidden="true"></div>
      <button type="button" id="fish" class="fish-btn" aria-label="릴 감기">
        <span class="water-ripple"></span>
        <span class="fish-body"></span>
        <span class="fish-tail"></span>
        <span class="fish-eye"></span>
        <span class="bobber"></span>
      </button>
      <div class="hp-bar" role="status" aria-live="polite">
        <div class="hp-fill" id="hpFill"></div>
      </div>
      <p class="hp-caption">물고기 남은 체력</p>
    </main>

    <footer class="footer">
      <span id="combo" class="combo hidden">콤보 ×1</span>
    </footer>
  </div>
  <script src="config.js"></script>
  <script src="game.js"></script>
</body>
</html>
